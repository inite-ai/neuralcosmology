<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.5" r="0.6">
      <stop offset="0%" stop-color="#1a2356"/>
      <stop offset="60%" stop-color="#0f1632"/>
      <stop offset="100%" stop-color="#0a1026"/>
    </radialGradient>
    <radialGradient id="core" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- outer faint ring -->
  <g transform="translate(256 256) rotate(-22)" fill="none" stroke="#818cf8" stroke-opacity="0.18" stroke-width="4">
    <ellipse cx="0" cy="0" rx="200" ry="72"/>
  </g>

  <!-- main orbit (tilted) -->
  <g transform="translate(256 256) rotate(-22)" fill="none" stroke="#a5b4fc" stroke-opacity="0.85" stroke-width="10" stroke-linecap="round">
    <ellipse cx="0" cy="0" rx="160" ry="58"/>
  </g>

  <!-- halo behind core -->
  <circle cx="256" cy="256" r="110" fill="url(#halo)"/>

  <!-- core -->
  <circle cx="256" cy="256" r="46" fill="url(#core)"/>
  <circle cx="256" cy="256" r="18" fill="#ffffff"/>
</svg>
