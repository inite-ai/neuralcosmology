<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="ea-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <radialGradient id="ea-sun" cx="0.5" cy="0.38" r="0.35">
      <stop offset="0%" stop-color="#fde68a" stop-opacity="0.6"/>
      <stop offset="60%" stop-color="#f59e0b" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#ea-bg)"/>
  <rect width="600" height="800" fill="url(#ea-sun)"/>

  <!-- Architectural columns silhouette -->
  <g fill="#064e3b" stroke="#10b981" stroke-opacity="0.4">
    <rect x="100" y="380" width="36" height="180"/>
    <rect x="160" y="360" width="36" height="200"/>
    <rect x="220" y="340" width="36" height="220"/>
    <rect x="280" y="320" width="36" height="240"/>
    <rect x="340" y="340" width="36" height="220"/>
    <rect x="400" y="360" width="36" height="200"/>
    <rect x="460" y="380" width="36" height="180"/>

    <polygon points="90,380 506,380 496,360 100,360" fill-opacity="0.7"/>
    <rect x="80" y="560" width="440" height="14" fill-opacity="0.8"/>
  </g>

  <!-- Stars -->
  <g fill="#fde68a" fill-opacity="0.6">
    <circle cx="120" cy="140" r="1"/>
    <circle cx="300" cy="95" r="1.3"/>
    <circle cx="460" cy="155" r="1"/>
    <circle cx="520" cy="220" r="0.8"/>
    <circle cx="80" cy="240" r="0.9"/>
  </g>

  <!-- Text -->
  <text x="60" y="100" font-family="Georgia, serif" font-size="13" letter-spacing="6" fill="#6ee7b7" fill-opacity="0.85">NEURAL COSMOLOGY · III</text>
  <text x="60" y="620" font-family="Georgia, serif" font-size="44" font-weight="600" fill="#f0fdf4" letter-spacing="-1">Era of</text>
  <text x="60" y="665" font-family="Georgia, serif" font-size="44" font-weight="600" fill="#6ee7b7" letter-spacing="-1">Architects</text>

  <line x1="60" y1="695" x2="140" y2="695" stroke="#10b981" stroke-width="2"/>
  <text x="60" y="725" font-family="Georgia, serif" font-size="15" letter-spacing="3" fill="#d1fae5" fill-opacity="0.9">MIKHAIL SAVCHENKO</text>
  <text x="60" y="750" font-family="Inter, sans-serif" font-size="12" letter-spacing="2" fill="#6ee7b7" fill-opacity="0.7">LITERARY SCI-FI · WIP</text>
</svg>
