<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800" width="600" height="800">
  <defs>
    <linearGradient id="ba-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#1a0b2e"/>
    </linearGradient>
    <radialGradient id="ba-glow" cx="0.5" cy="0.45" r="0.55">
      <stop offset="0%" stop-color="#f472b6" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" fill="url(#ba-bg)"/>
  <rect width="600" height="800" fill="url(#ba-glow)"/>

  <!-- Terminal window -->
  <g transform="translate(80 260)">
    <rect width="440" height="260" rx="6" fill="#0f172a" stroke="#f472b6" stroke-opacity="0.35"/>
    <circle cx="20" cy="20" r="5" fill="#ef4444"/>
    <circle cx="40" cy="20" r="5" fill="#fbbf24"/>
    <circle cx="60" cy="20" r="5" fill="#4ade80"/>
    <text x="24" y="75" font-family="Menlo, Consolas, monospace" font-size="14" fill="#4ade80">$ trace universe</text>
    <text x="24" y="100" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8">[warn] dark matter: unresolved</text>
    <text x="24" y="125" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8">[warn] antimatter: missing</text>
    <text x="24" y="150" font-family="Menlo, Consolas, monospace" font-size="14" fill="#94a3b8">[warn] consciousness: null</text>
    <text x="24" y="185" font-family="Menlo, Consolas, monospace" font-size="14" fill="#ef4444">EXCEPTION: reality.tsx:∞</text>
    <text x="24" y="210" font-family="Menlo, Consolas, monospace" font-size="14" fill="#f472b6">  at Debugger.fix()</text>
    <text x="24" y="235" font-family="Menlo, Consolas, monospace" font-size="14" fill="#4ade80">$ _<tspan opacity="0.5">▊</tspan></text>
  </g>

  <!-- Text -->
  <text x="60" y="100" font-family="Menlo, monospace" font-size="12" letter-spacing="6" fill="#f472b6" fill-opacity="0.85">NEURAL COSMOLOGY · II</text>
  <text x="60" y="170" font-family="Inter, sans-serif" font-size="58" font-weight="700" fill="#f8fafc" letter-spacing="-2">Bugs</text>
  <text x="60" y="225" font-family="Inter, sans-serif" font-size="58" font-weight="700" fill="#f472b6" letter-spacing="-2">Academy</text>

  <text x="60" y="620" font-family="Georgia, serif" font-size="18" fill="#e2e8f0" fill-opacity="0.9" font-style="italic">A debugger saves the universe.</text>
  <line x1="60" y1="660" x2="140" y2="660" stroke="#f472b6" stroke-width="2"/>
  <text x="60" y="700" font-family="Georgia, serif" font-size="15" letter-spacing="3" fill="#cbd5e1" fill-opacity="0.9">MIKHAIL SAVCHENKO</text>
  <text x="60" y="725" font-family="Inter, sans-serif" font-size="12" letter-spacing="2" fill="#f472b6" fill-opacity="0.7">SCI-FI · 231 PP</text>
</svg>
