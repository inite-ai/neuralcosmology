<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="og-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1026"/>
      <stop offset="100%" stop-color="#232946"/>
    </linearGradient>
    <radialGradient id="og-glow" cx="0.7" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a1026" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#og-bg)"/>
  <rect width="1200" height="630" fill="url(#og-glow)"/>

  <g fill="#e0e7ff" fill-opacity="0.6">
    <circle cx="120" cy="100" r="1.5"/>
    <circle cx="320" cy="140" r="1"/>
    <circle cx="960" cy="90" r="1.2"/>
    <circle cx="1080" cy="180" r="1"/>
    <circle cx="200" cy="480" r="1"/>
    <circle cx="1020" cy="500" r="1.1"/>
  </g>

  <g transform="translate(900 315)" fill="none" stroke="#a5b4fc" stroke-opacity="0.35">
    <ellipse cx="0" cy="0" rx="180" ry="60"/>
    <ellipse cx="0" cy="0" rx="120" ry="120" stroke-opacity="0.2"/>
    <ellipse cx="0" cy="0" rx="80" ry="28" stroke-opacity="0.55" transform="rotate(30)"/>
  </g>
  <circle cx="900" cy="315" r="8" fill="#e0e7ff"/>

  <text x="80" y="180" font-family="Georgia, serif" font-size="22" letter-spacing="8" fill="#a5b4fc" fill-opacity="0.8">NEURAL COSMOLOGY</text>
  <text x="80" y="310" font-family="Georgia, serif" font-size="72" font-weight="600" fill="#f1f5f9" letter-spacing="-2">Three books, one universe</text>
  <text x="80" y="390" font-family="Georgia, serif" font-size="72" font-weight="600" fill="#818cf8" letter-spacing="-2">from three angles.</text>

  <line x1="80" y1="450" x2="160" y2="450" stroke="#818cf8" stroke-width="3"/>
  <text x="80" y="500" font-family="Inter, sans-serif" font-size="24" fill="#c7d2fe" fill-opacity="0.85">A non-fiction investigation, a sci-fi novel, its literary sequel —</text>
  <text x="80" y="534" font-family="Inter, sans-serif" font-size="24" fill="#c7d2fe" fill-opacity="0.85">and the research programme behind them.</text>
  <text x="80" y="585" font-family="Inter, sans-serif" font-size="18" letter-spacing="3" fill="#818cf8" fill-opacity="0.8">NEURALCOSMOLOGY.COM  ·  MIKHAIL SAVCHENKO</text>
